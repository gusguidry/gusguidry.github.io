        {% for post in site.posts %}

    <li>{% endfor %} Subscribe <a href="{{ " /feed.xml" | prepend: site.baseurl }}">via RSS <img src="{{ site.baseurl }}/assets/icons/rss.svg" alt="Favicon"></a></li>
</ul>
