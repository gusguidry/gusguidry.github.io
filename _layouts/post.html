---
layout: default
---

{% include head.html %}
<div class="container">
  <div class="row justify-content-between">
    <div class="col-sm">
      {% include links.html %}
    </div>
    <div class="col-xl border rounded">
      <header>
        <h1>{{ page.title }}</h1>
        <p>{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} •
          {{
          page.meta }}{% endif %}</p>
      </header>
      <article>
        {{ content }}
      </article>
    </div>
    <div class="col-sm">
      One of three columns
    </div>
  </div>
</div>
