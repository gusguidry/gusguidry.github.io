---
layout: default
---
<div>
  <header>
    <h3>{{ page.title }}</h3>
    <p style="text-align: center;">
      {{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author
      }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}
      {{page.image | relative_url}}
    </p>
  </header>
  <article>{{ content }}</article>
</div>
