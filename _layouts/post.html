---
layout: default
---
{% include head.html %}
{% include links.html %}
<div>
  <div class="container">
    <div class="row">
      <div class="col">
        1 of 3
      </div>
      <div class="container border rounded my-5 p-3 shadow">
        <header>
          <h4 class="text-center">{{ page.title }}</h4>
          <p>{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} •
            {{
            page.meta }}{% endif %}</p>
        </header>
        <article class="col">
          {{ content }}
        </article>
      </div>
      <div class="col">
        3 of 3
      </div>
    </div>
  </div>
</div>
