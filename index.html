---
layout: default
---

<h6>Latest Posts 📝</h6>
<ul class="list-unstyled">
  <li>
      {% for post in site.posts limit:5 %}
      <b>
          <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      </b> {{ post.date | date: "%b %-d, %Y" }}
  </li>
  {% endfor %}
</ul>
Subscribe <a href="{{ " /feed.xml" | prepend: site.baseurl }}">via RSS</a>
