---
layout: default
---

<div class="container border rounded text-center my-5 p-3 shadow">
  <h1>Posts 📝</h1>
  <ul class="text-center list-unstyled">
    <li>
      {% for post in site.posts %}
      <b>
        <a class="container" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      </b> {{ post.date | date: "%b %-d, %Y" }}
    </li>
    {% endfor %}
  </ul>
  Subscribe <a href="{{ " /feed.xml" | prepend: site.baseurl }}">via RSS</a>
</div>
