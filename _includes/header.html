<header>
  <a href="{{ site.baseurl }}/"><img class="img" src="{{ site.baseurl }}/assets/images/gussketch.jpg"></a>
  <h1>
    <a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a>
  </h1>
  <nav>
    <div>
      | {% for page in site.pages %} {% if page.title %}
      <a href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a> |
      {% endif %} {% endfor %}
    </div>
  </nav>
</header>
